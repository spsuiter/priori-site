<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <style>
      .wm { font-family: 'Space Grotesk', 'Helvetica Neue', Arial, sans-serif; }
      .tl { font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Bracket mark -->
  <!-- Left vertical bar -->
  <rect x="4" y="8" width="5" height="50" fill="#FFFFFF" rx="2"/>
  <!-- Top horizontal bar -->
  <rect x="4" y="8" width="20" height="5" fill="#FFFFFF" rx="2"/>
  <!-- Bottom horizontal bar -->
  <rect x="4" y="53" width="20" height="5" fill="#FFFFFF" rx="2"/>
  <!-- P letterform -->
  <text x="10" y="50" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="36" fill="#FFFFFF">P</text>
  <!-- Blue accent bar (right side of bracket) -->
  <rect x="44" y="16" width="4" height="34" fill="#2979FF" rx="2"/>

  <!-- Wordmark: Priori -->
  <text x="60" y="46" class="wm"
        font-weight="600" font-size="36" fill="#FFFFFF" letter-spacing="1">Priori</text>

  <!-- Tagline -->
  <text x="60" y="63" class="tl"
        font-weight="400" font-size="10.5" fill="#A8BDD4" letter-spacing="0.3">Your firm's institutional knowledge, organized.</text>
</svg>
